      <div class="settings-group-title" data-i18n="section_privateRoom">Private Room</div>

        <div class="field"><label data-i18n="p_triggerVoiceChannelId">triggerVoiceChannelId</label><select id="p_triggerVoiceChannelId"></select></div>
        <div class="field"><label data-i18n="p_userLimit">userLimit (0-99)</label><input type="number" min="0" max="99" id="p_userLimit"></div>

    </div>
