<div class="settings-group">
  <div id="welcome_message_card_title_modal" class="settings-group-title" data-i18n="welcome_message_card_title">Welcome Message</div>
  <div class="grid2">
    <div class="field">
      <label id="label_w_title" data-i18n="w_title">welcomeTitle</label>
      <input id="w_title" type="text">
      <div id="hint_w_title" class="keyhint" data-i18n="w_title_hint">Available placeholders: {user}, {guild}</div>
    </div>
    <div class="field">
      <label id="label_w_message" data-i18n="w_message">welcomeMessage</label>
      <textarea id="w_message"></textarea>
      <div id="hint_w_message" class="keyhint" data-i18n="w_message_hint">Available placeholders: {user}, {username}, {guild}, {id}, {tag}, {isBot}, {createdAt}, {accountAgeDays}</div>
    </div>
  </div>
</div>
