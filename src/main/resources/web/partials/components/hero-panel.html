<div class="hero-panel">
  <div class="login-hero">__BOT_AVATAR_BLOCK__</div>
  <div class="auth-actions">
    <div class="row lang-switch">
      <span id="langLabel" class="muted" data-i18n="langLabel">Language</span>
      <div id="uiLangButtons" class="row"></div>
    </div>
    <div id="authBlock" class="row"><button id="loginBtn" class="primary" data-i18n="loginBtn">Sign in with Discord</button></div>
    <div id="userBlock" class="hidden">
      <div class="user-profile user-profile-inline">
        <img id="meAvatar" class="user-avatar hidden" alt="avatar" loading="lazy" referrerpolicy="no-referrer" />
        <div class="user-name-block">
          <div id="meLine"></div>
        </div>
        <button id="logoutBtn" class="logout-inline danger" data-i18n="logoutBtn">Logout</button>
      </div>
    </div>
  </div>
</div>
