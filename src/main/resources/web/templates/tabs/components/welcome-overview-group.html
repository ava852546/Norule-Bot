<div class="welcome-shell">
  <div class="settings-group">
    <div id="welcome_message_card_title" class="settings-group-title" data-i18n="welcome_message_card_title">Welcome Message</div>
    <div id="welcome_message_lead" class="welcome-lead" data-i18n="welcome_message_lead">Set the public welcome message shown to new members, including the target channel, title, and content.</div>
    <div class="welcome-toggle">
      <div class="welcome-topline">
        <div class="field"><label id="label_w_channelId" data-i18n="w_channelId">welcomeChannelId</label><select id="w_channelId"></select></div>
        <div class="toggle"><input type="checkbox" id="w_enabled"><label for="w_enabled" data-i18n="w_enabled">enabled</label></div>
      </div>
    </div>
    <div class="welcome-compact-actions">
      <button id="sendWelcomePreviewBtn" class="primary" type="button" data-i18n="sendWelcomePreviewBtn">Send Preview Message</button>
      <button id="openWelcomeEditorBtn" class="warn" type="button" data-i18n="openWelcomeEditorBtn">Configure Welcome Message</button>
    </div>
  </div>
</div>
