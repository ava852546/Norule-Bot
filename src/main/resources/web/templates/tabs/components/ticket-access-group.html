<div class="settings-group">
  <div id="ticket_group_access_title" class="settings-group-title" data-i18n="ticket_group_access_title">Access & Blacklist</div>
  <div class="grid2">
    <div class="field role-field">
      <label data-i18n="t_supportRoleIds">supportRoleIds</label>
      <div class="role-meta">
        <div id="hint_t_supportRoleIds" class="keyhint" data-i18n="t_supportRoleIds_hint">Hold Ctrl/Cmd to select multiple roles.</div>
        <div id="t_supportRoleCount" class="role-count">0</div>
      </div>
      <select id="t_supportRoleIds" class="role-multi" multiple size="7"></select>
    </div>
    <div class="field">
      <label data-i18n="t_blacklistedUserIds">blacklistedUserIds (comma separated)</label>
      <input type="text" id="t_blacklistedUserIds">
      <div id="hint_t_blacklistedUserIds" class="keyhint" data-i18n="t_blacklistedUserIds_hint">Enter user IDs separated by commas.</div>
    </div>
  </div>
</div>
