<div class="settings-group">
  <div id="welcome_media_card_title" class="settings-group-title" data-i18n="welcome_media_card_title">Welcome Media</div>
  <div class="welcome-media-grid">
    <div class="welcome-card">
      <div id="welcome_thumbnail_card_title" class="welcome-card-title" data-i18n="welcome_thumbnail_card_title">Thumbnail</div>
      <div class="field">
        <label id="label_w_thumbnailUrl" data-i18n="w_thumbnailUrl">welcomeThumbnailUrl</label>
        <input id="w_thumbnailUrl" type="url">
        <div id="hint_w_thumbnailUrl" class="keyhint" data-i18n="w_thumbnailUrl_hint">Use a direct `https://...` image URL for the small top-right thumbnail.</div>
      </div>
    </div>
    <div class="welcome-card">
      <div id="welcome_image_card_title" class="welcome-card-title" data-i18n="welcome_image_card_title">Large Image</div>
      <div class="field">
        <label id="label_w_imageUrl" data-i18n="w_imageUrl">welcomeImageUrl</label>
        <input id="w_imageUrl" type="url">
        <div id="hint_w_imageUrl" class="keyhint" data-i18n="w_imageUrl_hint">Use a direct `https://...` image URL for the large image below the message.</div>
      </div>
    </div>
  </div>
</div>
