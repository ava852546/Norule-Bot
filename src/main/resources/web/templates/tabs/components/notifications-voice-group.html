<div class="settings-group">
  <div id="notification_voice_template_card_title" class="settings-group-title" data-i18n="notification_voice_template_card_title">Voice Notification Embed</div>
  <div class="grid2">
    <div class="field">
      <label data-i18n="n_voiceJoinMessage">voiceJoinMessage</label>
      <textarea id="n_voiceJoinMessage"></textarea>
      <div id="hint_n_voiceJoinMessage" class="keyhint" data-i18n="n_voiceJoinMessage_hint">Available placeholders: {user}, {channel}, {from}, {to}</div>
    </div>
    <div class="field">
      <label data-i18n="n_voiceLeaveMessage">voiceLeaveMessage</label>
      <textarea id="n_voiceLeaveMessage"></textarea>
      <div id="hint_n_voiceLeaveMessage" class="keyhint" data-i18n="n_voiceLeaveMessage_hint">Available placeholders: {user}, {channel}, {from}, {to}</div>
    </div>
    <div class="field">
      <label data-i18n="n_voiceMoveMessage">voiceMoveMessage</label>
      <textarea id="n_voiceMoveMessage"></textarea>
      <div id="hint_n_voiceMoveMessage" class="keyhint" data-i18n="n_voiceMoveMessage_hint">Available placeholders: {user}, {channel}, {from}, {to}</div>
    </div>
  </div>
  <div class="welcome-card notification-color-shell">
    <div id="notification_voice_color_card_title" class="welcome-card-title" data-i18n="notification_voice_color_card_title">Voice Embed Colors</div>
    <div class="notification-color-grid">
      <div class="field"><label data-i18n="n_voiceJoinColor">voiceJoinColor</label><input type="color" id="n_voiceJoinColor"></div>
      <div class="field"><label data-i18n="n_voiceLeaveColor">voiceLeaveColor</label><input type="color" id="n_voiceLeaveColor"></div>
      <div class="field"><label data-i18n="n_voiceMoveColor">voiceMoveColor</label><input type="color" id="n_voiceMoveColor"></div>
    </div>
  </div>
</div>
