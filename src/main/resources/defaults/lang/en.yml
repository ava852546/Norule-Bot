help:
  title: "Bot Help"
  intro: "Welcome to NoRule Bot. Use the dropdown or category buttons below to switch sections."
  select_placeholder: "Choose a category"
  category_music: "Music"
  category_settings: "Settings"
  category_moderation: "Moderation"
  category_private_room: "Private Room"
  category_game: "Game"
  category_ticket: "Ticket"
  category_general: "General"
  content_music: |
    Playback
    `/join`, `/play query:<keyword or URL>`, `/music-panel`
    `/加入`, `/播放 query:<關鍵字或URL>`, `/音樂面板`

    Controls
    `/skip`, `/stop`, `/leave`, `/repeat mode:<off|single|all>`
    `/跳過`, `/停止`, `/離開`, `/循環`

    Volume and Info
    `/volume value:<0-200>`, `/history`, `/music stats`
    `/音量 value:<0-200>`, `/播放歷史`, `/音樂 統計`

    Playlists
    `/playlist save|load|delete|list name:<playlist>`
    `/歌單 儲存|載入|刪除|列表 name:<歌單名稱>`

    Features
    The music panel supports playback controls, volume, repeat modes, autoplay, artwork, history, and server music stats.
  content_settings: |
    Server Settings
    `/settings action:info|reload|reset|template|module|logs|music|number-chain|language`
    `/設定 選項:詳細資訊|重載設定|恢復預設|模板編輯|模組開關|日誌頻道|音樂設定|接龍遊戲|語言設置`

    Welcome Message
    `/welcome`
    `/welcome action:enable|status`
    `/welcome channel:<text-channel>`
    `/歡迎訊息`
    `/歡迎訊息 action:啟用|狀態`
    `/歡迎訊息 頻道:<文字頻道>`

    Features
    Manage modules, notification templates, log channels, music settings, number chain, language, and welcome messages.
  content_moderation: |
    Message Cleanup
    `/delete-messages channel`, `/delete-messages user`
    `/刪除訊息 type:頻道|使用者`

    Warnings
    `/warnings action:add|remove|view|clear`
    `/警告 action:增加|減少|查看|清除`

    Anti-Duplicate
    `/anti-duplicate action:enable|status`
    `/防洗頻 action:啟用|狀態`

    Features
    Quickly clean messages, manage warning counts, and check or enable duplicate-message protection.
  content_private_room: |
    Trigger Setup
    Configure the trigger voice channel in:
    `/settings action:music`
    `/設定 選項:音樂設定`

    Room Controls
    `/private-room-settings`
    `/包廂設定`

    Actions
    Lock, unlock, set user limit, rename, and transfer ownership.
  content_game: |
    Number Chain
    Direct commands
    `/number-chain action:enable|status channel:<text-channel> reset:<true|false>`
    `/數字接龍 action:enable|status channel:<text-channel> reset:<true|false>`

    Settings entry
    `/settings action:number-chain`
    `/設定 選項:接龍遊戲`

    Available actions
    - Set the text channel
    - Enable or disable the game
    - Reset progress back to 1

    Rules
    - Input must match the next expected number
    - The same user cannot continue twice in a row
    - Wrong input resets progress to 1
  content_ticket: |
    Ticket Management
    `/ticket action:enable|status|panel|close|limit|blacklist-add|blacklist-remove|blacklist-list`

    Features
    Send a ticket panel, close tickets, set open limits per user, manage blacklists, and use interactive menus or modals when needed.
  content_general: |
    - `/help` and `/說明` open this help panel
    - `/ping` and `/延遲` show current bot latency
    - `/welcome` and `/歡迎訊息` edit the welcome message
    - `/settings action:language` and `/設定 選項:語言設置` switch language
    - The Web UI can manage welcome messages, tickets, music, private rooms, and number chain
  tip_title: "Quick Tip"
  tip_body: "Use the dropdown or the buttons below to switch between General, Music, Settings, Moderation, Private Room, Game, and Ticket."
