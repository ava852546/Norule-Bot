help:
  title: "機器人說明"
  intro: "歡迎使用 NoRule Bot。可使用下方下拉選單或按鈕切換分類。"
  select_placeholder: "選擇分類"
  category_music: "音樂"
  category_settings: "設定"
  category_moderation: "管理"
  category_private_room: "私人包廂"
  category_game: "遊戲"
  category_general: "一般"
  content_music: |
    🎧 快速開始
    `/join` 讓 Bot 進入你所在語音頻道
    `/play query:<關鍵字或 URL>` 搜尋或播放歌曲
    `/music-panel` 建立互動控制面板

    🎮 播放控制
    `/skip` 跳過目前歌曲
    `/stop` 停止播放並清空列隊
    `/leave` 讓 Bot 離開語音頻道
    `/repeat mode:<off|single|all>` 切換循環模式

    🧩 補充
    `/settings music` 可設定音樂功能與私人包廂觸發頻道
    `/設定` 的 `音樂功能` 可用中文選單操作
  content_settings: |
    ⚙️ 設定入口（中文）
    `/設定` 使用 `action` 選項：
    資訊 / 重新加載 / 恢復預設 / 訊息模板 / 模組開關 / 紀錄頻道 / 音樂功能 / 語言

    ⚙️ 設定入口（英文）
    `/settings` 仍可用子指令：
    info / reload / reset / template / module / logs / music / language

    📌 `/settings info` 已更新
    已移除「總覽」頁，改為分頁模式（下拉選單 + 按鈕切換）
    目前包含：
    通知 / 通知模板 / 訊息日誌 / 音樂設定 / 私人包廂 / 數字接龍 / 模組
  content_moderation: |
    🧹 訊息清理
    `/刪除訊息 type:頻道 channel:<文字頻道> amount:<1-99>`
    `/刪除訊息 type:使用者 user:<使用者> amount:<1-99>`
    `/delete-messages <channel|user>`（英文）

    含確認按鈕，可避免誤刪。
  content_private_room: |
    🏠 觸發設定
    在 `/設定` 的 `音樂功能` 設定「私人包廂觸發頻道」

    🛠️ 包廂管理
    `/private-room-settings` 或 `/包廂設定`
    可對自己包廂進行：
    - 上鎖 / 解鎖
    - 設定人數上限（1-99，留空=無上限）
    - 更改名稱（最多 10 字）

    ♻️ 自動清理
    私人包廂無人時會自動刪除，避免頻道累積。
  content_game: |
    🎲 數字接龍
    `/數字接龍 set-channel channel:<文字頻道>`（中文別名）
    `/數字接龍 enable value:<true|false>`（中文別名）
    `/數字接龍 reset`（中文別名）

    `/number-chain set-channel channel:<文字頻道>` 設定接龍頻道
    `/number-chain enable value:<true|false>` 開啟或關閉
    `/number-chain reset` 重置進度

    規則：
    - 必須依序輸入下一個數字
    - 同一位使用者不可連續接龍
    - 輸入錯誤會重置為 1
  content_general: |
    - `/help` 開啟此說明面板
    - 語言切換：`/設定` -> `語言`
    - 或使用 `/settings language code:<語言代碼>`
  tip_title: "快速使用"
  tip_body: "點擊下方分類按鈕可立即切換頁面。"

