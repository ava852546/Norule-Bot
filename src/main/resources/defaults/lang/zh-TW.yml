help:
  title: "機器人說明"
  intro: "歡迎使用 NoRule 機器人。可使用下方「下拉選單」或「按鈕」切換分類。"
  select_placeholder: "選擇分類"
  category_music: "音樂"
  category_settings: "設定"
  category_moderation: "管理"
  category_private_room: "私人包廂"
  category_general: "一般"
  content_music: |
    🎧 快速開始
    `/join` 讓 Bot 進入你所在語音頻道
    `/play query:<關鍵字或網址>` 開始搜尋或播放
    `/music-panel` 建立互動控制面板

    🎮 播放控制
    `/skip` 跳過目前歌曲
    `/stop` 停止播放並清空佇列
    `/leave` 讓 Bot 離開語音頻道
    `/repeat mode:<off|single|all>` 切換循環模式

    📌 使用建議
    先用 `/settings music` 開啟選單，設定「音樂指令頻道」方便集中管理。
  content_settings: |
    ⚙️ 基本管理
    `/settings info` 查看目前生效設定
    `/settings reload` 重新載入伺服器設定
    `/settings language code:<en|zh-TW>` 切換語系
    `/settings reset` 開啟重設選單（含二次確認）

    🧩 通知模板
    `/settings template`
    以「下拉選單」選擇要編輯的模板，再開啟表單輸入

    📢 通知與日誌頻道
    `/settings logs`
    先用下拉選單選擇要設定的日誌類型，再用頻道選擇器挑選文字頻道

    🎵 音樂與包廂
    `/settings music`
    以「下拉選單」設定：
    - 自動離開開關
    - 自動離開分鐘（1-60）
    - Autoplay 開關
    - 音樂指令頻道
    - 私人包廂觸發頻道

    🧱 模組開關
    `/settings module`
    以「下拉選單」快速切換各模組開關

    🏠 私人包廂快捷
    `/private-room-settings` 或 `/包廂設定`
    可上鎖、調整人數上限、修改包廂名稱
  content_moderation: "● `/delete-messages channel amount` 批次刪除頻道訊息\n● `/delete-messages user amount` 刪除指定使用者訊息\n● `/刪除訊息` 為中文別名\n● 有確認按鈕，可避免誤刪"
  content_private_room: |
    🏠 觸發設定
    `/settings music`
    開啟音樂設定選單後，選擇「私人包廂觸發頻道」即可設定。

    🛠️ 包廂管理
    `/private-room-settings` 或 `/包廂設定`
    可對自己包廂進行：
    - 上鎖頻道
    - 設定人數上限（1-99，留空=無上限）
    - 更改名稱（最多 10 字）

    ♻️ 自動清理
    私人包廂無人時會自動刪除，避免頻道累積。
  content_general: "● `/help` 開啟此說明面板\n● 可搭配 `/settings language` 切換語系"
  tip_title: "快速使用"
  tip_body: "點擊下方分類按鈕可立即切換頁面。"

