help:
  title: "Bot 說明"
  intro: "歡迎使用 NoRule Bot。請使用下拉選單或下方分類按鈕切換說明頁面。"
  select_placeholder: "選擇分類"
  category_music: "音樂"
  category_settings: "設定"
  category_moderation: "管理"
  category_private_room: "私人包廂"
  category_game: "遊戲"
  category_general: "一般"
  content_music: |
    音樂播放
    `/join` 加入你目前所在的語音頻道
    `/play query:<關鍵字或URL>` 搜尋並播放歌曲
    `/music-panel` 建立互動式控制面板

    播放控制
    `/skip` 跳過目前歌曲
    `/stop` 停止播放並清空佇列
    `/leave` 讓 Bot 離開語音頻道
    `/repeat mode:<off|single|all>` 切換循環模式

    音樂工具
    `/volume value:<0-200>` 設定伺服器音量
    `/history` 顯示最近播放紀錄
    `/playlist action:<save|load|delete|list>` 管理已儲存歌單
    `/music action:stats` 顯示播放統計
  content_settings: |
    中文設定流程
    `/設定` 使用 `選項` 選單：
    資訊 / 重載 / 重設 / 模板 / 模組 / 日誌 / 音樂 / 接龍 / 語言

    英文設定流程
    `/settings` 使用 `action` 選單：
    info / reload / reset / template / module / logs / music / number-chain / language

    資訊面板
    `/settings action:info` 會開啟分頁資訊面板：
    notifications / templates / logs / music / private-room / number-chain / module
  content_moderation: |
    訊息清理
    `/刪除訊息` 中文使用選項式流程
    `/delete-messages` 英文保留 channel/user 路由

    警告系統
    `/警告` 和 `/warnings` 支援 add / remove / view / clear
    add/remove/clear 會先要求填寫原因再執行
  content_private_room: |
    觸發設定
    請在 `/settings action:music` 中設定私人包廂觸發頻道

    包廂控制
    `/private-room-settings` 或 `/包廂設定`
    可用操作：
    - 上鎖 / 解鎖
    - 設定人數上限
    - 重新命名包廂

    自動清理
    私人包廂在無人時會自動刪除
  content_game: |
    數字接龍
    可從以下位置開啟數字接龍設定：
    `/設定` -> `選項:接龍`
    `/settings` -> `action:number-chain`

    可用操作
    - 設定頻道
    - 啟用或停用
    - 重設進度

    規則
    - 輸入必須符合下一個預期數字
    - 同一位使用者不能連續接龍兩次
    - 輸入錯誤會將進度重設回 1
  content_general: |
    - `/help` 開啟此說明面板
    - `/ping` 顯示目前延遲資訊
    - 語言切換：`/settings` -> `action:language`
    - 從下拉選單中選擇目標語言
  tip_title: "快速提示"
  tip_body: "點擊下方分類按鈕可以快速切換頁面。"

