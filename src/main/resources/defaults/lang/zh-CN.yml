help:
  title: "机器人说明"
  intro: "欢迎使用 NoRule Bot。可使用下方下拉菜单或按钮切换分类。"
  select_placeholder: "选择分类"
  category_music: "音乐"
  category_settings: "设置"
  category_moderation: "管理"
  category_private_room: "私人包厢"
  category_game: "游戏"
  category_general: "一般"
  content_music: |
    🎧 快速开始
    `/join` 让 Bot 进入你所在语音频道
    `/play query:<关键词或 URL>` 搜索或播放歌曲
    `/music-panel` 创建交互控制面板

    🎮 播放控制
    `/skip` 跳过当前歌曲
    `/stop` 停止播放并清空列队
    `/leave` 让 Bot 离开语音频道
    `/repeat mode:<off|single|all>` 切换循环模式

    🧩 补充
    `/settings music` 可设置音乐功能与私人包厢触发频道
    `/设置` 的 `音乐功能` 可用中文菜单操作
  content_settings: |
    ⚙️ 设置入口（中文）
    `/设置` 使用 `action` 选项：
    信息 / 重新加载 / 恢复默认 / 消息模板 / 模块开关 / 日志频道 / 音乐功能 / 语言

    ⚙️ 设置入口（英文）
    `/settings` 仍可用子指令：
    info / reload / reset / template / module / logs / music / language

    📌 `/settings info` 已更新
    已移除「总览」页，改为分页模式（下拉菜单 + 按钮切换）
    目前包含：
    通知 / 通知模板 / 消息日志 / 音乐设置 / 私人包厢 / 数字接龙 / 模块
  content_moderation: |
    🧹 消息清理
    `/删除消息 type:频道 channel:<文字频道> amount:<1-99>`
    `/删除消息 type:使用者 user:<用户> amount:<1-99>`
    `/delete-messages <channel|user>`（英文）

    含确认按钮，可避免误删。
  content_private_room: |
    🏠 触发设置
    在 `/设置` 的 `音乐功能` 设置「私人包厢触发频道」

    🛠️ 包厢管理
    `/private-room-settings` 或 `/包厢设置`
    可对自己包厢进行：
    - 上锁 / 解锁
    - 设置人数上限（1-99，留空=无上限）
    - 更改名称（最多 10 字）

    ♻️ 自动清理
    私人包厢无人时会自动删除，避免频道累积。
  content_game: |
    🎲 数字接龙
    `/數字接龍 set-channel channel:<文字频道>`（中文别名）
    `/數字接龍 enable value:<true|false>`（中文别名）
    `/數字接龍 reset`（中文别名）

    `/number-chain set-channel channel:<文字频道>` 设置接龙频道
    `/number-chain enable value:<true|false>` 开启或关闭
    `/number-chain reset` 重置进度

    规则：
    - 必须按顺序输入下一个数字
    - 同一位用户不可连续接龙
    - 输入错误会重置为 1
  content_general: |
    - `/help` 开启此说明面板
    - 语言切换：`/设置` -> `语言`
    - 或使用 `/settings language code:<语言代码>`
  tip_title: "快速使用"
  tip_body: "点击下方分类按钮可立即切换页面。"

