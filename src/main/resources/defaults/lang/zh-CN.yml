help:
  title: "机器人说明"
  intro: "欢迎使用 NoRule 机器人。可使用下方「下拉菜单」或「按钮」切换分类。"
  select_placeholder: "选择分类"
  category_music: "音乐"
  category_settings: "设置"
  category_moderation: "管理"
  category_private_room: "私人包厢"
  category_general: "一般"
  content_music: |
    🎧 快速开始
    `/join` 让 Bot 进入你所在语音频道
    `/play query:<关键词或网址>` 开始搜索或播放
    `/music-panel` 创建交互控制面板

    🎮 播放控制
    `/skip` 跳过当前歌曲
    `/stop` 停止播放并清空队列
    `/leave` 让 Bot 离开语音频道
    `/repeat mode:<off|single|all>` 切换循環模式

    📌 使用建议
    先用 `/settings music` 开启菜单，设置「音乐指令频道」方便集中管理。
  content_settings: |
    ⚙️ 基本管理
    `/settings info` 查看当前生效设置
    `/settings reload` 重新加载服务器设置
    `/settings language code:<en|zh-TW>` 切换语言
    `/settings reset` 开启重置菜单（含二次确认）

    🧩 通知模板
    `/settings template`
    以「下拉菜单」选择要编辑的模板，再开启表单输入

    📢 通知与日志频道
    `/settings logs`
    先用下拉菜单选择要设置的日志类型，再用频道选择器挑选文字频道

    🎵 音乐与包厢
    `/settings music`
    以「下拉菜单」设置：
    - 自动离开开关
    - 自动离开分钟（1-60）
    - Autoplay 开关
    - 音乐指令频道
    - 私人包厢触发频道

    🧱 模块开关
    `/settings module`
    以「下拉菜单」快速切换各模块开关

    🏠 私人包厢快捷
    `/private-room-settings` 或 `/包厢设置`
    可上锁、调整人数上限、修改包厢名称
  content_moderation: "● `/delete-messages channel amount` 批次删除频道消息\n● `/delete-messages user amount` 删除指定用户消息\n● `/删除消息` 为中文別名\n● 有确认按钮，可避免误删"
  content_private_room: |
    🏠 触发设置
    `/settings music`
    开启音乐设置菜单后，选择「私人包厢触发频道」即可设置。

    🛠️ 包厢管理
    `/private-room-settings` 或 `/包厢设置`
    可对自己包厢进行：
    - 上锁频道
    - 设置人数上限（1-99，留空=无上限）
    - 更改名称（最多 10 字）

    ♻️ 自动清理
    私人包厢无人时会自动删除，避免频道累积。
  content_general: "● `/help` 开启此说明面板\n● 可搭配 `/settings language` 切换语言"
  tip_title: "快速使用"
  tip_body: "点击下方分类按钮可立即切换页面。"

