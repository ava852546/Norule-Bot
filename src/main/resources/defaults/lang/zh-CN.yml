help:
  title: "Bot 帮助"
  intro: "欢迎使用 NoRule Bot。请使用下拉菜单或下方分类按钮切换说明页面。"
  select_placeholder: "选择分类"
  category_music: "音乐"
  category_settings: "设置"
  category_moderation: "管理"
  category_private_room: "私人包厢"
  category_game: "游戏"
  category_ticket: "客服单"
  category_general: "常规"
  content_music: |
    主要播放
    `/join`、`/play query:<keyword or URL>`、`/music-panel`
    `/加入`、`/播放 query:<关键词或URL>`、`/音樂面板`

    播放控制
    `/skip`、`/stop`、`/leave`、`/repeat mode:<off|single|all>`
    `/跳過`、`/停止`、`/離開`、`/循環`

    音量与信息
    `/volume value:<1-100>`、`/history`、`/music stats`
    `/音量 value:<1-100>`、`/播放歷史`、`/音樂 統計`

    歌单
    `/playlist save|load|delete|list name:<playlist>`
    `/歌單 儲存|載入|刪除|列表 name:<歌單名稱>`

    功能介绍
    音乐面板支持播放控制、音量调整、循环模式、自动推荐、封面显示、播放历史与音乐统计。
  content_settings: |
    服务器设置
    `/settings action:info|reload|reset|template|module|logs|music|number-chain|language`
    `/設定 選項:詳細資訊|重載設定|恢復預設|模板編輯|模組開關|日誌頻道|音樂設定|接龍遊戲|語言設置`

    欢迎消息
    `/welcome`
    `/welcome action:enable|status`
    `/welcome channel:<text-channel>`
    `/歡迎訊息`
    `/歡迎訊息 action:啟用|狀態`
    `/歡迎訊息 頻道:<文字頻道>`

    功能介绍
    可管理模块开关、通知模板、日志频道、音乐设置、数字接龙、语言与欢迎消息内容。
  content_moderation: |
    消息清理
    `/delete-messages channel`、`/delete-messages user`
    `/刪除訊息 type:頻道|使用者`

    警告系统
    `/warnings action:add|remove|view|clear`
    `/警告 action:增加|減少|查看|清除`

    防刷屏
    `/anti-duplicate action:enable|status`
    `/防洗頻 action:啟用|狀態`

    功能介绍
    可快速清理消息、管理警告记录，并检查或启用重复消息检测。
  content_private_room: |
    触发设置
    请从以下位置设置私人包厢触发语音频道：
    `/settings action:music`
    `/設定 選項:音樂設定`

    包厢控制
    `/private-room-settings`
    `/包廂設定`

    可用操作
    上锁、解锁、设置人数上限、重命名、转让房主。
  content_game: |
    数字接龙
    直接指令
    `/number-chain action:enable|status channel:<文字频道> reset:<true|false>`
    `/數字接龍 action:啟用|狀態 channel:<文字频道> reset:<true|false>`

    设置入口
    `/settings action:number-chain`
    `/設定 選項:接龍遊戲`

    可用操作
    - 设置文字频道
    - 启用或停用游戏
    - 将进度重置回 1

    规则
    - 输入必须符合下一个预期数字
    - 同一位用户不能连续接龙两次
    - 输入错误会将进度重置回 1
  content_ticket: |
    客服单管理
    `/ticket action:enable|status|panel|close|limit|blacklist-add|blacklist-remove|blacklist-list`
    `/客服單 action:啟用|狀態|面板|關閉|上限|黑名單新增|黑名單移除|黑名單列表`

    功能介绍
    可发送客服单面板、关闭客服单、设置每位用户上限、管理黑名单，并支持交互菜单与输入窗口。
  content_general: |
    - `/help` 与 `/說明` 可打开此说明面板
    - `/ping` 与 `/延遲` 可查看当前 Bot 延迟
    - `/welcome` 与 `/歡迎訊息` 可编辑欢迎消息
    - `/settings action:language` 与 `/設定 選項:語言設置` 可切换语言
    - Web UI 可管理欢迎消息、客服单、音乐、私人包厢与数字接龙
  tip_title: "快速提示"
  tip_body: "可使用下拉菜单或下方按钮，在常规、音乐、设置、管理、私人包厢、游戏、客服单之间快速切换。"

