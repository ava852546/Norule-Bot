help:
  title: "Bot 帮助"
  intro: "欢迎使用 NoRule Bot。请使用下拉菜单或下方分类按钮切换说明页面。"
  select_placeholder: "选择分类"
  category_music: "音乐"
  category_settings: "设置"
  category_moderation: "管理"
  category_private_room: "私人包厢"
  category_game: "游戏"
  category_general: "常规"
  content_music: |
    音乐播放
    `/join` 加入你当前所在的语音频道
    `/play query:<关键词或URL>` 搜索并播放歌曲
    `/music-panel` 创建交互式控制面板

    播放控制
    `/skip` 跳过当前歌曲
    `/stop` 停止播放并清空队列
    `/leave` 让 Bot 离开语音频道
    `/repeat mode:<off|single|all>` 切换循环模式

    音乐工具
    `/volume value:<0-200>` 设置服务器音量
    `/history` 显示最近播放记录
    `/playlist action:<save|load|delete|list>` 管理已保存歌单
    `/music action:stats` 显示播放统计
  content_settings: |
    中文设置流程
    `/设置` 使用 `选项` 菜单：
    信息 / 重载 / 重置 / 模板 / 模块 / 日志 / 音乐 / 接龙 / 语言

    英文设置流程
    `/settings` 使用 `action` 菜单：
    info / reload / reset / template / module / logs / music / number-chain / language

    信息面板
    `/settings action:info` 会打开分页信息面板：
    notifications / templates / logs / music / private-room / number-chain / module
  content_moderation: |
    消息清理
    `/删除讯息` 中文使用选项式流程
    `/delete-messages` 英文保留 channel/user 路由

    警告系统
    `/警告` 和 `/warnings` 支持 add / remove / view / clear
    add/remove/clear 会先要求填写原因再执行
  content_private_room: |
    触发设置
    请在 `/settings action:music` 中设置私人包厢触发频道

    包厢控制
    `/private-room-settings` 或 `/包厢设置`
    可用操作：
    - 上锁 / 解锁
    - 设置人数上限
    - 重命名包厢

    自动清理
    私人包厢在无人时会自动删除
  content_game: |
    数字接龙
    可从以下位置打开数字接龙设置：
    `/设置` -> `选项:接龙`
    `/settings` -> `action:number-chain`

    可用操作
    - 设置频道
    - 启用或停用
    - 重置进度

    规则
    - 输入必须符合下一个预期数字
    - 同一位用户不能连续接龙两次
    - 输入错误会将进度重置回 1
  content_general: |
    - `/help` 打开此帮助面板
    - `/ping` 显示当前延迟信息
    - 语言切换：`/settings` -> `action:language`
    - 从下拉菜单中选择目标语言
  tip_title: "快速提示"
  tip_body: "点击下方分类按钮可以快速切换页面。"

